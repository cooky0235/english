<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>英検準２ 単語テスト1-100</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}


.container{
    max-width:450px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
}


.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}


h1{
    font-size:22px;
}


select{
    padding:8px;
    font-size:16px;
    border-radius:8px;
}


.count{
    color:#666;
    margin-top:10px;
}


.jp{
    font-size:30px;
    margin:30px 0;
    font-weight:bold;
}


input{
    width:90%;
    padding:12px;
    font-size:22px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
}

.button-area{
    display:flex;
    justify-content:center;
    margin-top:15px;
}

button{
    flex:0 0 160px;
    margin:5px;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#07c160;
    color:white;
}


.result{
    margin-top:20px;
    font-size:18px;
}


.wrong{
    text-align:left;
    margin-top:20px;
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>📚 英検準２ 単語1</h1>


<select id="groupSelect" onchange="changeGroup()">

<option value="0">101～110</option>
<option value="1">111～120</option>
<option value="2">121～130</option>
<option value="3">131～140</option>
<option value="4">141～150</option>
<option value="5">151～160</option>
<option value="6">161～170</option>
<option value="7">171～180</option>
<option value="8">181～190</option>
<option value="9">191～200</option>

</select>


</div>


<div class="count" id="count"></div>
<div id="timer" style="color:#666;margin-top:5px;">
時間：00:00
</div>
<div class="jp" id="jp"></div>


<input 
id="answer"
placeholder="英単語を入力してください"
onkeydown="if(event.key==='Enter'){check();}">


<div class="button-area">

<button onclick="check()">OK</button>

</div>


<div class="result" id="result"></div>


</div>



<script>


// =====================
// 英単語データ
// =====================


const allGroups = [

/* 101～110 */
[
{jp:"～の味がする",en:"taste"},
{jp:"を修理する",en:"fix"},
{jp:"を開催する",en:"hold"},
{jp:"を集める",en:"collect"},
{jp:"にペンキを塗る",en:"paint"},
{jp:"の写しをとる",en:"copy"},
{jp:"を推測する",en:"guess"},
{jp:"を創造する",en:"create"},
{jp:"～が…するのを許す",en:"allow"},
{jp:"帰る",en:"return"}
],

/*111～120*/
[
{jp:"を提案する",en:"suggest"},
{jp:"くつろぐ",en:"relax"},
{jp:"を加える",en:"add"},
{jp:"を予約する",en:"reserve"},
{jp:"をデザインする",en:"design"},
{jp:"についていく",en:"follow"},
{jp:"の心をとらえる",en:"attract"},
{jp:"に合格する",en:"pass"},
{jp:"～がいなくてさびしく思う",en:"miss"},
{jp:"を推薦する",en:"recommend"}
],

/*121～130*/
[
{jp:"を出す",en:"serve"},
{jp:"を借りる",en:"rent"},
{jp:"目を覚ます",en:"wake"},
{jp:"を焼く",en:"bake"},
{jp:"を準備する",en:"prepare"},
{jp:"に損傷を与える",en:"damage"},
{jp:"を我慢する",en:"bear"},
{jp:"～のようだ",en:"seem"},
{jp:"を説明する",en:"explain"},
{jp:"を引き起こす",en:"cause"}
],

/*131～140*/
[
{jp:"を満たす",en:"fill"},
{jp:"を殺す",en:"kill"},
{jp:"服を着る",en:"dress"},
{jp:"を投げる",en:"throw"},
{jp:"に気づく",en:"notice"},
{jp:"結果",en:"result"},
{jp:"最前部",en:"front"},
{jp:"調理法",en:"recipe"},
{jp:"地域",en:"area"},
{jp:"訪問者",en:"visitor"}
],

/*141～150*/
[
{jp:"衣服",en:"clothes"},
{jp:"プラスチック",en:"plastic"},
{jp:"機会",en:"chance"},
{jp:"販売",en:"sale"},
{jp:"技術",en:"skill"},
{jp:"発表",en:"presentation"},
{jp:"定期航空便",en:"flight"},
{jp:"車輪",en:"wheel"},
{jp:"製品",en:"product"},
{jp:"食事",en:"meal"}
],

/*151～160*/
[
{jp:"種",en:"seed"},
{jp:"陸地",en:"land"},
{jp:"薬",en:"medicine"},
{jp:"予約",en:"reservation"},
{jp:"宇宙",en:"space"},
{jp:"アパート",en:"apartment"},
{jp:"虫",en:"insect"},
{jp:"ショッピングモール",en:"mall"},
{jp:"スマートフォン",en:"smartphone"},
{jp:"成績",en:"grade"}
],

/*161～170*/
[
{jp:"警察",en:"police"},
{jp:"賞",en:"prize"},
{jp:"市場",en:"market"},
{jp:"見本市",en:"fair"},
{jp:"欄",en:"section"},
{jp:"価格",en:"price"},
{jp:"事実",en:"fact"},
{jp:"部",en:"department"},
{jp:"規則",en:"rule"},
{jp:"自然",en:"nature"}
],

/*171～180*/
[
{jp:"島",en:"island"},
{jp:"商品",en:"goods"},
{jp:"消防隊員",en:"firefighter"},
{jp:"人",en:"person"},
{jp:"夫",en:"husband"},
{jp:"品目",en:"item"},
{jp:"隣人",en:"neighbor"},
{jp:"オーケストラ",en:"orchestra"},
{jp:"門",en:"gate"},
{jp:"健康に良い",en:"healthy"}
],

/*181～190*/
[
{jp:"本当の",en:"true"},
{jp:"～ではないかと心配して",en:"afraid"},
{jp:"危険な",en:"dangerous"},
{jp:"野生の",en:"wild"},
{jp:"安全な",en:"safe"},
{jp:"過去の",en:"past"},
{jp:"入手できる",en:"available"},
{jp:"成功した",en:"successful"},
{jp:"完全な",en:"perfect"},
{jp:"より少なく",en:"less"}
],

/*191～200*/
[
{jp:"簡単に",en:"easily"},
{jp:"その他に",en:"else"},
{jp:"海外で",en:"abroad"},
{jp:"最近",en:"recently"},
{jp:"今日（こんにち）では",en:"nowadays"},
{jp:"どこかに",en:"somewhere"},
{jp:"先へ",en:"forward"},
{jp:"～だけれども",en:"although"},
{jp:"～なしで",en:"without"},
{jp:"～を通って",en:"through"}
]
];
// =====================
// テスト処理
// =====================


let testWords=[];

let index=0;

let score=0;

let wrongWords=[];

let currentGroup=0;

let answered=false;

// 计时
let startTime = 0;
let timerInterval = null;
let isTimeout = false;
    
// ランダム並び替え
function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        let j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];

    }

    return array;

}



// グループ変更
function changeGroup(){

    currentGroup=
    Number(document.getElementById("groupSelect").value);
  // 保存当前选择
    localStorage.setItem(
        "lastGroup",
        currentGroup
    );

    startTest();

}



// テスト開始
function startTest(){

     // 重置状态
    index = 0;
    score = 0;
    wrongWords = [];
    answered = false;
    isTimeout = false;


    // 重新开始计时
    clearInterval(timerInterval);

    startTime = Date.now();

    timerInterval = setInterval(updateTimer,1000);


    // 重新生成题目
    testWords = shuffle([...allGroups[currentGroup]]);


    // 显示第一题
    show();

}



// 問題表示
function show(){


    answered=false;


    document.getElementById("count").innerHTML=

    "第 "+(index+1)+" 問 / 全 "+testWords.length+" 問";



    document.getElementById("jp").innerHTML=

    testWords[index].jp;

  let answerBox = document.getElementById("answer");


    answerBox.disabled=false;

    answerBox.value="";


    document.getElementById("result").innerHTML="";


    // 自动进入输入框
    answerBox.focus();

}




// 間違い追加
function addWrong(){


    let exists =
    wrongWords.some(function(word){

        return word.en==testWords[index].en;

    });



    if(!exists){

        wrongWords.push(testWords[index]);

    }


}




// OKボタン
function check(){


    let answerBox=
    document.getElementById("answer");



    if(answered){

        return;

    }



    let input=
    answerBox.value
    .trim()
    .toLowerCase();



    answered=true;

    answerBox.disabled=true;

let delay;

    if(input==testWords[index].en){


        score++;


        document.getElementById("result").innerHTML=

        "⭕ 正解です！";
 delay = 1000;

    }else{


        addWrong();


        document.getElementById("result").innerHTML=

        "❌ 不正解　正解："+testWords[index].en;

 delay = 2000;
    }



  setTimeout(function(){
if(isTimeout){
        return;
    }
    moveNext();

   if(document.getElementById("answer")){
        document.getElementById("answer").focus();
    }

},delay);
}







// 次の問題へ
function moveNext(){


    index++;



    if(index>=testWords.length){


        finish();

        return;

    }



    show();


}

function updateTimer(){

    let seconds = Math.floor(
        (Date.now() - startTime) / 1000
    );


    let min = Math.floor(seconds / 60);

    let sec = seconds % 60;


    document.getElementById("timer").innerHTML =
    "時間：" +
    String(min).padStart(2,"0") +
    ":" +
    String(sec).padStart(2,"0");
    
  // 3分超過で終了
    if(seconds >= 180){

        clearInterval(timerInterval);

        isTimeout = true;

        finish();
 return;
    }
}

// 終了画面
function finish(){

clearInterval(timerInterval);


let totalSeconds =
Math.floor((Date.now()-startTime)/1000);


let min=Math.floor(totalSeconds/60);

let sec=totalSeconds%60;


let timeText =
String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

    let startNo = currentGroup * 10 + 1;
let endNo = currentGroup * 10 + 10;
    
    let html=

    "<h1>🎉 テスト終了</h1>"+
(isTimeout
?
"<h2>⏰ 制限時間を超えました</h2>"
:
""
)+
          "<h3>問題：" + startNo + "～" + endNo + "</h3>" +
    "<h2>"+score+
    " / "+
    testWords.length+
    " 問 正解</h2>"+

"<h3>⏱ 時間："+timeText+"</h3>";




    if(wrongWords.length>0){



        html+=

        "<div class='wrong'>"+

        "<h3>❌ 間違えた単語</h3>";



        wrongWords.forEach(function(word){


            html+=

            "<p>"+
            word.jp+
            " → "+
            word.en+
            "</p>";


        });



        html+="</div>";



        html+=

        "<button class='retry-btn' onclick='retryWrong()'>"+
        "もう一度間違えた単語だけテストする"+
        "</button>";



   }else if(!isTimeout){

    html+=
    "<h3>🎊 全問正解です！</h3>";

}

html +=
"<br><br>" +
"<button class='retry-btn' onclick='goHome()'>ホームへ戻る</button>";

document.querySelector(".container").innerHTML = html;


}




// 間違えた単語だけ再テスト
function retryWrong(){



    testWords=
    shuffle([...wrongWords]);



    index=0;

    score=0;

    wrongWords=[];
 answered = false;

    isTimeout = false;

    document.querySelector(".container").innerHTML=


    "<div class='header'>"+
    "<h1>📚 間違えた単語テスト</h1>"+
    "</div>"+


    "<div class='count' id='count'></div>"+


    "<div class='jp' id='jp'></div>"+


    "<input id='answer' "+
    "placeholder='英単語を入力してください' "+
    "onkeydown=\"if(event.key==='Enter'){check();}\">"+



    "<div class='button-area'>"+

    "<button onclick='check()'>OK</button>"+


    "</div>"+



    "<div class='result' id='result'></div>";


answered = false;
isTimeout = false;
    show();


}

// ホームへ戻る
function goHome(){

    location.reload();

}


// 開始
let savedGroup = localStorage.getItem("lastGroup");


if(savedGroup !== null){

    currentGroup = Number(savedGroup);

    document.getElementById("groupSelect").value = currentGroup;

}


startTest();


setTimeout(function(){

    document.getElementById("answer").focus();

},100);
</script>

</body>

</html>
