<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検準2級 英単語テスト</title>

<style>

body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.container {
  max-width:400px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

h1 {
  font-size:22px;
}

.jp {
  font-size:28px;
  margin:30px 0;
  font-weight:bold;
}

input {
  width:90%;
  font-size:22px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  text-align:center;
}


button {
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#07c160;
  color:white;
}


.buttons {
  display:flex;
  gap:10px;
  margin-top:15px;
}


.buttons button {
  width:50%;
}


.result {
  margin-top:20px;
  font-size:18px;
}


.count {
  color:#666;
}

</style>

</head>


<body>


<div class="container">


<h1>📚 英検準2級 英単語テスト</h1>


<div class="count" id="count"></div>


<div class="jp" id="jp"></div>


<input id="answer" placeholder="英単語を入力">


<div class="buttons">

<button onclick="check()">OK</button>

<button onclick="next()">次へ</button>

</div>


<div class="result" id="result"></div>


</div>



<script>


let words = [

{jp:"～させる、許す", en:"let"},
{jp:"決める、決定する", en:"decide"},
{jp:"訓練する、練習する", en:"train"},
{jp:"旅行する", en:"travel"},
{jp:"去る、離れる、残す", en:"leave"},
{jp:"駐車する、公園", en:"park"},
{jp:"注文する、命令する", en:"order"},
{jp:"失う、負ける", en:"lose"},
{jp:"動く、引っ越す", en:"move"},
{jp:"支払う", en:"pay"},
{jp:"待つ", en:"wait"},
{jp:"変える、変わる", en:"change"},
{jp:"確認する、調べる", en:"check"},
{jp:"建てる、作る", en:"build"},
{jp:"心配する", en:"worry"},
{jp:"植える", en:"plant"},
{jp:"練習する", en:"practice"},
{jp:"世話をする、気にかける", en:"care"},
{jp:"説明する、描写する", en:"describe"},
{jp:"費用がかかる", en:"cost"}

];



// ランダム順
words.sort(() => Math.random() - 0.5);



let index=0;

let score=0;



function show(){


document.getElementById("count").innerHTML =
"第 "+(index+1)+" 問 / 全 "+words.length+" 問";


document.getElementById("jp").innerHTML =
words[index].jp;


document.getElementById("answer").value="";


document.getElementById("result").innerHTML="";


document.getElementById("answer").focus();


}



function check(){


let input =
document.getElementById("answer")
.value
.trim()
.toLowerCase();



if(input == words[index].en){


score++;


document.getElementById("result")
.innerHTML="⭕ 正解です！";


}else{


document.getElementById("result")
.innerHTML=
"❌ 不正解<br>正解："+words[index].en;


}


}



function next(){


index++;


if(index >= words.length){


document.querySelector(".container").innerHTML =

"<h1>🎉 テスト終了</h1>"+
"<h2>"+score+" / "+words.length+" 問 正解</h2>";


return;

}


show();


}



show();



</script>


</body>
</html>
