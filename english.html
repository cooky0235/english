<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>毎日の英単語テスト</title>

<style>

body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}


.container {
  max-width:400px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}


h1 {
  font-size:22px;
}


.jp {
  font-size:28px;
  margin:30px 0;
  font-weight:bold;
}


input {
  width:90%;
  font-size:22px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  text-align:center;
}


.button-area {
  display:flex;
  justify-content:center;
  margin-top:15px;
}


button {
  flex:1;
  margin:5px;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#07c160;
  color:white;
}


.result {
  margin-top:20px;
  font-size:18px;
}


.count {
  color:#666;
}


.wrong {
  text-align:left;
  margin-top:20px;
}


</style>

</head>


<body>


<div class="container">

<h1>📚 毎日の英単語テスト</h1>


<div class="count" id="count"></div>


<div class="jp" id="jp"></div>


<input 
id="answer" 
placeholder="英単語を入力してください"
onkeydown="if(event.key==='Enter'){check();}">


<div class="button-area">

<button onclick="check()">OK</button>

<button onclick="next()">次へ</button>

</div>


<div class="result" id="result"></div>


</div>



<script>


//毎日ここだけ変更
const words = [

  {jp:"決める", en:"decide"},
  {jp:"訓練する", en:"train"},
  {jp:"旅行する", en:"travel"},
  {jp:"去る・離れる", en:"leave"},
  {jp:"公園", en:"park"},
  {jp:"注文する", en:"order"},
  {jp:"失う", en:"lose"},
  {jp:"動く", en:"move"},
  {jp:"支払う", en:"pay"}

];



let testWords = [...words];

let index = 0;

let score = 0;

let wrongWords = [];



//問題表示
function show(){


document.getElementById("count").innerHTML =

"第 "+(index+1)+" 問 / 全 "+testWords.length+" 問";


document.getElementById("jp").innerHTML =

testWords[index].jp;


document.getElementById("answer").value="";


document.getElementById("result").innerHTML="";


}




//答え合わせ
function check(){


let input = document

.getElementById("answer")

.value

.trim()

.toLowerCase();



if(input == testWords[index].en){


score++;


document.getElementById("result").innerHTML =

"⭕ 正解です！";


}else{


wrongWords.push(testWords[index]);


document.getElementById("result").innerHTML =

"❌ 不正解　正解：" + testWords[index].en;


}


}





//次へ
function next(){


index++;


if(index >= testWords.length){


finish();

return;


}


show();


}





//終了
function finish(){



let html =

"<h1>🎉 テスト終了</h1>"+

"<h2>"+score+" / "+testWords.length+" 問 正解</h2>";





if(wrongWords.length > 0){



html +=

"<div class='wrong'>"+

"<h3>❌ 間違えた単語</h3>";



wrongWords.forEach(function(word){


html +=

"<p>"+word.jp+" → "+word.en+"</p>";


});



html += "</div>";



html +=

"<button onclick='retryWrong()'>"+
"もう一度間違えた単語だけテストする"+
"</button>";



}else{


html +=

"<h3>🎊 全問正解です！</h3>";


}




document.querySelector(".container").innerHTML = html;



}




//間違えた単語だけ再テスト
function retryWrong(){



testWords = [...wrongWords];


index = 0;


score = 0;


wrongWords = [];



document.querySelector(".container").innerHTML =



"<h1>📚 間違えた単語テスト</h1>"+

"<div class='count' id='count'></div>"+

"<div class='jp' id='jp'></div>"+

"<input id='answer' placeholder='英単語を入力してください' "+
"onkeydown=\"if(event.key==='Enter'){check();}\">"+


"<div class='button-area'>"+

"<button onclick='check()'>OK</button>"+

"<button onclick='next()'>次へ</button>"+

"</div>"+


"<div class='result' id='result'></div>";



show();


}




//開始
show();


</script>


</body>

</html>
