<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>英単語テスト</title>

<style>

body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}


.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}


.container {
  max-width:400px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}


h1 {
  font-size:22px;
}


select {
  font-size:16px;
  padding:8px;
  border-radius:8px;
}


.jp {
  font-size:28px;
  margin:30px 0;
  font-weight:bold;
}


input {

  width:90%;
  font-size:22px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  text-align:center;

}


.button-area {

  display:flex;
  margin-top:15px;

}


button {

  flex:1;
  margin:5px;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#07c160;
  color:white;

}


.result {

  margin-top:20px;
  font-size:18px;

}


.count {

  color:#666;

}


.wrong {

  text-align:left;
  margin-top:20px;

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>📚 英単語テスト</h1>


<select id="groupSelect" onchange="changeGroup()">

<option value="0">1～20</option>

<option value="1">21～40</option>

<option value="2">41～60</option>

<option value="3">61～80</option>

<option value="4">81～100</option>

</select>


</div>


<div class="count" id="count"></div>


<div class="jp" id="jp"></div>


<input 
id="answer"
placeholder="英単語を入力してください"
onkeydown="if(event.key==='Enter'){check();}">


<div class="button-area">

<button onclick="check()">OK</button>

<button onclick="next()">次へ</button>

</div>


<div class="result" id="result"></div>


</div>



<script>


// =====================
// 単語データ
// =====================

const allGroups = [


/* 1～20 */

[
{jp:"～させる",en:"let"},
{jp:"決心する",en:"decide"},
{jp:"訓練する",en:"train"},
{jp:"旅行する",en:"travel"},
{jp:"置き忘れる",en:"leave"},
{jp:"駐車する",en:"park"},
{jp:"注文する",en:"order"},
{jp:"失う",en:"lose"},
{jp:"動かす",en:"move"},
{jp:"支払う",en:"pay"},
{jp:"待つ",en:"wait"},
{jp:"変える",en:"change"},
{jp:"確かめる",en:"check"},
{jp:"建てる",en:"build"},
{jp:"心配する",en:"worry"},
{jp:"植える",en:"plant"},
{jp:"練習する",en:"practice"},
{jp:"気にかける",en:"care"},
{jp:"描写する",en:"describe"},
{jp:"費用がかかる",en:"cost"}
],


/* 21～40 */

[
{jp:"曲げる",en:"turn"},
{jp:"に加わる",en:"join"},
{jp:"成長する",en:"grow"},
{jp:"救う",en:"save"},
{jp:"勝つ",en:"win"},
{jp:"選ぶ",en:"pick"},
{jp:"信じる",en:"believe"},
{jp:"報告する",en:"report"},
{jp:"忘れる",en:"forget"},
{jp:"傷つける",en:"hurt"},
{jp:"借りる",en:"borrow"},
{jp:"驚かせる",en:"surprise"},
{jp:"ボランティアをする",en:"volunteer"},
{jp:"運ぶ",en:"carry"},
{jp:"置く",en:"set"},
{jp:"招待する",en:"invite"},
{jp:"偶然起こる",en:"happen"},
{jp:"選ぶ",en:"choose"},
{jp:"案内する",en:"guide"},
{jp:"到着する",en:"arrive"}
],


/* 41～60 */

[
{jp:"提供する",en:"offer"},
{jp:"覚えている",en:"remember"},
{jp:"中止する",en:"cancel"},
{jp:"修理する",en:"repair"},
{jp:"言い訳",en:"excuse"},
{jp:"インターネット",en:"internet"},
{jp:"考え",en:"idea"},
{jp:"情報",en:"information"},
{jp:"あなた",en:"honey"},
{jp:"火",en:"fire"},
{jp:"野菜",en:"vegetable"},
{jp:"状況",en:"situation"},
{jp:"一節",en:"passage"},
{jp:"出来事",en:"event"},
{jp:"奥様",en:"ma'am"},
{jp:"アボカド",en:"avocado"},
{jp:"型",en:"type"},
{jp:"パン屋",en:"bakery"},
{jp:"将来",en:"future"},
{jp:"運動",en:"exercise"}
],


/* 61～80 */

[
{jp:"ビン",en:"bottle"},
{jp:"合図",en:"sign"},
{jp:"サービス",en:"service"},
{jp:"生ゴミ",en:"garbage"},
{jp:"顧客",en:"customer"},
{jp:"職業",en:"business"},
{jp:"トラブル",en:"trouble"},
{jp:"周遊旅行",en:"tour"},
{jp:"競走",en:"race"},
{jp:"環境",en:"environment"},
{jp:"活動",en:"activity"},
{jp:"他の",en:"other"},
{jp:"違った",en:"different"},
{jp:"重要な",en:"important"},
{jp:"特別な",en:"special"},
{jp:"十分な",en:"enough"},
{jp:"高価な",en:"expensive"},
{jp:"困難な",en:"difficult"},
{jp:"ほとんど～ない",en:"few"},
{jp:"別の",en:"another"}
],


/* 81～100 */

[
{jp:"接近した",en:"close"},
{jp:"自分自身の",en:"own"},
{jp:"地元の",en:"local"},
{jp:"おいしい",en:"delicious"},
{jp:"外国の",en:"foreign"},
{jp:"しかしながら",en:"however"},
{jp:"～でさえ",en:"even"},
{jp:"オンラインで",en:"online"},
{jp:"屋外に",en:"outside"},
{jp:"その代わりに",en:"instead"},
{jp:"遠くに",en:"far"},
{jp:"たぶん",en:"probably"},
{jp:"でも",en:"though"},
{jp:"実際に",en:"actually"},
{jp:"あとで",en:"later"},
{jp:"もう・まだ",en:"yet"},
{jp:"すぐに",en:"quickly"},
{jp:"屋内に",en:"inside"},
{jp:"とにかく",en:"anyway"},
{jp:"～している間に",en:"while"}
]


];
// =====================
// 测試処理
// =====================


//現在の単語
let testWords = [];

let index = 0;

let score = 0;

let wrongWords = [];

let currentGroup = 0;



//ランダム並び替え
function shuffle(array){

  for(let i=array.length-1;i>0;i--){

    let j=Math.floor(Math.random()*(i+1));

    [array[i],array[j]]=[array[j],array[i]];

  }

  return array;

}



//グループ変更
function changeGroup(){


currentGroup =
Number(document.getElementById("groupSelect").value);


startTest();


}



//テスト開始
function startTest(){


testWords = shuffle(
  [...allGroups[currentGroup]]
);


index = 0;

score = 0;

wrongWords = [];


show();


}



//問題表示
function show(){


document.getElementById("count").innerHTML =

"第 "+(index+1)+" 問 / 全 "+testWords.length+" 問";



document.getElementById("jp").innerHTML =

testWords[index].jp;



document.getElementById("answer").value="";


document.getElementById("answer").disabled=false;



document.getElementById("result").innerHTML="";



}




//答え合わせ
function check(){


let answerBox =
document.getElementById("answer");


//連打防止
if(answerBox.disabled){

 return;

}



let input =
answerBox.value
.trim()
.toLowerCase();



answerBox.disabled=true;



if(input == testWords[index].en){


score++;


document.getElementById("result").innerHTML =

"⭕ 正解です！";



}else{


let exists =
wrongWords.some(function(word){


return word.en == testWords[index].en;


});



if(!exists){

wrongWords.push(testWords[index]);

}



document.getElementById("result").innerHTML =

"❌ 不正解　正解：" + testWords[index].en;


}



//2秒後自動次へ

setTimeout(function(){


index++;


if(index >= testWords.length){


finish();

return;


}



show();


},2000);



}




//手動次へ
function next(){


index++;


if(index >= testWords.length){


finish();

return;


}



show();


}




//終了画面
function finish(){


let html =

"<h1>🎉 テスト終了</h1>"+

"<h2>"+score+" / "+testWords.length+" 問 正解</h2>";




if(wrongWords.length > 0){


html +=

"<div class='wrong'>"+

"<h3>❌ 間違えた単語</h3>";



wrongWords.forEach(function(word){


html +=

"<p>"+word.jp+" → "+word.en+"</p>";


});



html +=

"</div>";



html +=

"<button onclick='retryWrong()'>"+
"もう一度間違えた単語だけテストする"+
"</button>";



}else{


html +=

"<h3>🎊 全問正解です！</h3>";



}



document.querySelector(".container").innerHTML = html;



}




//間違えた単語だけ再テスト
function retryWrong(){


testWords =
shuffle([...wrongWords]);



index = 0;

score = 0;

wrongWords = [];



document.querySelector(".container").innerHTML =


"<div class='header'>"+

"<h1>📚 間違えた単語テスト</h1>"+

"</div>"+


"<div class='count' id='count'></div>"+


"<div class='jp' id='jp'></div>"+


"<input id='answer' "+
"placeholder='英単語を入力してください' "+
"onkeydown=\"if(event.key==='Enter'){check();}\">"+


"<div class='button-area'>"+

"<button onclick='check()'>OK</button>"+

"<button onclick='next()'>次へ</button>"+

"</div>"+


"<div class='result' id='result'></div>";



show();



}



//開始
startTest();
