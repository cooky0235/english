<script>

const words = [
  {jp:"決める", en:"decide"},
  {jp:"訓練する", en:"train"},
  {jp:"旅行する", en:"travel"},
  {jp:"去る・離れる", en:"leave"},
  {jp:"公園", en:"park"},
  {jp:"注文する", en:"order"},
  {jp:"失う", en:"lose"},
  {jp:"動く・引っ越す", en:"move"},
  {jp:"支払う", en:"pay"}
];

let current = 0;
let score = 0;
let miss = [];

const jpText = document.getElementById("jp");
const answer = document.getElementById("answer");
const result = document.getElementById("result");


// 問題表示
function showQuestion(){

    if(current >= words.length){
        showResult();
        return;
    }

    jpText.innerHTML =
        "問題 " + (current + 1) +
        " / " + words.length +
        "<br><br>" +
        words[current].jp;

    answer.value="";
    result.innerHTML="";

}


// 答え確認
function checkAnswer(){

    let input =
        answer.value.trim().toLowerCase();

    let correct =
        words[current].en;


    if(input === correct){

        score++;

        result.innerHTML =
          "<span class='ok'>〇 正解</span>";

    }else{

        miss.push(words[current]);

        result.innerHTML =
          "<span class='ng'>× 不正解<br>正解：" 
          + correct +
          "</span>";
    }

}


// 次へ
function nextQuestion(){

    current++;

    showQuestion();

}


// 結果表示
function showResult(){

    jpText.innerHTML =
      "テスト終了";

    answer.style.display="none";

    document.getElementById("buttons")
      .style.display="none";


    let html =
      "<h2>結果</h2>" +
      score +
      " / " +
      words.length +
      " 点";


    if(miss.length > 0){

        html +=
        "<h3>間違えた単語</h3>";

        miss.forEach(function(w){

            html +=
            w.jp +
            " → " +
            w.en +
            "<br>";

        });

    }else{

        html +=
        "<br><br>全問正解！";

    }


    result.innerHTML = html;

}


// 初期表示
showQuestion();


</script>
<script>

// Enterキーで回答チェック
answer.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        checkAnswer();

    }

});


// 再挑戦
function retry(){

    current = 0;
    score = 0;
    miss = [];

    answer.style.display="block";

    document.getElementById("buttons")
      .style.display="flex";


    showQuestion();

}


</script>
