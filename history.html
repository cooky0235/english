<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>学習履歴</title>


<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}


.container{

    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;

}


h1{
    text-align:center;
}


table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}


th,td{

    border:1px solid #ccc;
    padding:10px;
    text-align:center;

}


th{

    background:#eee;

}


</style>

</head>


<body>


<div class="container">


<h1>📚 学習履歴</h1>


<table>


<thead>

<tr>

<th>問題</th>
<th>日付</th>
<th>問題数</th>

<th>正解</th>

<th>正答率</th>
<th>間違い単語</th>
</tr>

</thead>


<tbody id="history">


</tbody>


</table>


</div>



<script>


fetch("/api/result")


.then(response=>response.json())


.then(data=>{


    let html="";


    data.forEach(function(item){


        html +=

        `
        <tr>

<td>${item.question_range}</td>
        <td>${item.test_date}</td>
        <td>${item.total}</td>

        <td>${item.correct}</td>

        <td>${item.rate}%</td>
<td>${item.wrong_words || ""}</td>
        </tr>
        `;


    });



    document.getElementById("history")
    .innerHTML=html;


})

.catch(error=>{

    document.getElementById("history").innerHTML=
    `
    <tr>
    <td colspan="4">
    データ取得失敗
    </td>
    </tr>
    `;

});


</script>


</body>

</html>
