<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>学習記録</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#eee;
}

button{
    margin-top:20px;
    width:100%;
    padding:10px;
    font-size:16px;
}
</style>

</head>


<body>

<div class="container">

<h1>学習記録</h1>

<table>

<thead>
<tr>
<th>日付</th>
<th>問題数</th>
<th>正解</th>
<th>正答率</th>
</tr>
</thead>

<tbody id="history">
</tbody>

</table>


<button onclick="clearHistory()">
記録を削除
</button>


</div>


<script>


// 記録取得
let history =
JSON.parse(localStorage.getItem("testHistory")) || [];


let html="";


if(history.length===0){

    html=
    `
    <tr>
    <td colspan="4">
    まだ記録がありません
    </td>
    </tr>
    `;

}else{


    history.reverse().forEach(function(item){

        html +=
        `
        <tr>
        <td>${item.date}</td>
        <td>${item.total}</td>
        <td>${item.correct}</td>
        <td>${item.rate}%</td>
        </tr>
        `;

    });

}


document.getElementById("history").innerHTML=html;



// 記録削除
function clearHistory(){

    if(confirm("学習記録を削除しますか？")){

        localStorage.removeItem("testHistory");

        location.reload();

    }

}


</script>


</body>

</html>
