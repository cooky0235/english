<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>学習履歴</title>


<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}


.container{

    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;

}


h1{
    text-align:center;
}


table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}


th,td{

    border:1px solid #ccc;
    padding:10px;
    text-align:center;
 white-space: nowrap;
}


th{

    background:#eee;

}

button{
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#07c160;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
    .button-area{

    margin-top:30px;
    text-align:center;

}
</style>

</head>


<body>


<div class="container">


<h1 id="title">📚 学習履歴</h1>


<table>


<thead>

<tr>

<th>問題</th>
<th>日付</th>
<th>問題数</th>

<th>正解</th>

<th>正答率</th>
<th>間違い単語</th>
</tr>

</thead>


<tbody id="history">


</tbody>


</table>

<br><br>

<div class="button-area">

    <button onclick="goHome()">
        ホームへ戻る
    </button>

</div>
</div>



<script>

const params = new URLSearchParams(location.search);

const name = params.get("name");
    const from = params.get("from");
    document.getElementById("title").textContent =
    "📚 " + name + " の学習履歴";
fetch("/api/result?name=" + encodeURIComponent(name))


.then(response=>response.json())


.then(data=>{


    let html="";


    data.forEach(function(item){


        html +=

        `
        <tr>

<td>${item.question_range}</td>
        <td>${item.test_date}</td>
        <td>${item.total}</td>

        <td>${item.correct}</td>

        <td>${item.rate}%</td>
<td>${item.wrong_words || ""}</td>
        </tr>
        `;


    });



    document.getElementById("history")
    .innerHTML=html;


})

.catch(error=>{

    document.getElementById("history").innerHTML=
    `
    <tr>
    <td colspan="4">
    データ取得失敗
    </td>
    </tr>
    `;

});

    function goHome(){

    if(from){

        location.href = from;

    }else{

         history.back();

    }
}

</script>


</body>

</html>
