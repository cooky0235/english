<table>

<thead>
<tr>
<th>日期</th>
<th>問題数</th>
<th>正解</th>
<th>正答率</th>
</tr>
</thead>

<tbody id="history">

</tbody>

</table>


<script>


fetch("/api/result")
.then(response=>response.json())
.then(data=>{


    let html="";


    data.forEach(function(item){


        html +=
        `
        <tr>
        <td>${item.test_date}</td>
        <td>${item.total}</td>
        <td>${item.correct}</td>
        <td>${item.rate}%</td>
        </tr>
        `;


    });


    document.getElementById("history")
    .innerHTML=html;


});


</script>
